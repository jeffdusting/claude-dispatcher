# Dispatcher CI — Migration Plan §4.3.4 (Phase A.3) + §4.10.3 (Phase A.10).
#
# This workflow is the PR gate. Two jobs:
#  - `lint`: typecheck. Strict — failures block merge.
#  - `test`: bun test runner over the suite under tests/. Strict — failures
#    block merge.
#
# DISPATCHER_TEST_MODE=1 is set on the test job so config.ts gates every
# on-disk secret fallback (Δ OD-034) — no test path can accidentally read
# .secrets/* or send a real Twilio SMS.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run bun test suite
        env:
          DISPATCHER_TEST_MODE: '1'
        run: bun test
